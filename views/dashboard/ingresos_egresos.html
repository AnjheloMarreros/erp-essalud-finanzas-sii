<!DOCTYPE html>
<html lang="es">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ingresos y Egresos - Finanzas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../../assets/js/tailwind-config.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Iconos Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body class="bg-essalud-light font-sans text-essalud-text flex h-screen overflow-hidden">
    <!-- Sidebar -->
    <aside class="w-64 bg-white border-r border-essalud-border flex flex-col h-full shrink-0">
        <div class="p-4 border-b border-essalud-border flex items-center gap-3">
            <div class="bg-gray-100 p-2 rounded-lg text-essalud-blue">
                <i class="ph ph-buildings text-2xl"></i>
            </div>
            <div>
                <h2 class="font-bold text-sm text-gray-800">Sede Central</h2>
                <p class="text-xs text-gray-500">Red Prestacional Sabogal</p>
            </div>
        </div>
        <nav class="flex-1 overflow-y-auto p-4 space-y-2">
            <a href="#" class="sidebar-menu-item flex items-center gap-3 px-3 py-2 rounded-lg text-gray-600 hover:bg-gray-100 transition-colors">
                <i class="ph ph-squares-four text-lg"></i> Dashboard
            </a>
            <a href="tesoreria.html" class="sidebar-menu-item flex items-center gap-3 px-3 py-2 rounded-lg text-gray-600 hover:bg-gray-100 transition-colors">
                <i class="ph ph-bank text-lg"></i> Tesorería
            </a>
            <a href="ingresos_egresos.html" class="sidebar-menu-item flex items-center gap-3 px-3 py-2 rounded-lg bg-essalud-blue text-white transition-colors">
                <i class="ph ph-money text-lg"></i> Ingresos/Egresos
            </a>
            <a href="contabilidad.html" class="sidebar-menu-item flex items-center gap-3 px-3 py-2 rounded-lg text-gray-600 hover:bg-gray-100 transition-colors">
                <i class="ph ph-calculator text-lg"></i> Contabilidad
            </a>
            <a href="reportes.html" class="sidebar-menu-item flex items-center gap-3 px-3 py-2 rounded-lg text-gray-600 hover:bg-gray-100 transition-colors">
                <i class="ph ph-file-text text-lg"></i> Reportes
            </a>
        </nav>
        <div class="p-4 border-t border-essalud-border space-y-2">
            <a href="#" class="flex items-center gap-3 px-3 py-2 text-gray-600 hover:bg-gray-100 rounded-lg transition-colors">
                <i class="ph ph-gear text-lg"></i> Configuración
            </a>
            <a href="../auth/login.html" class="flex items-center gap-3 px-3 py-2 text-red-600 hover:bg-red-50 rounded-lg transition-colors">
                <i class="ph ph-sign-out text-lg"></i> Cerrar Sesión
            </a>
        </div>
    </aside>

    <!-- Main Content -->
    <div class="flex-1 flex flex-col h-full overflow-hidden">
        <!-- Topbar -->
        <header class="bg-white border-b border-essalud-border h-16 flex items-center justify-end px-6 shrink-0">

            <div class="flex items-center gap-4">
                <div class="relative">
                    <i class="ph ph-magnifying-glass absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                    <input type="text" placeholder="Buscar transacción..." class="pl-10 pr-4 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:border-essalud-blue w-64 bg-gray-50">
                </div>
                <button class="text-gray-500 hover:text-essalud-blue relative">
                    <i class="ph ph-bell text-xl"></i>
                    <span class="absolute -top-1 -right-1 w-2 h-2 bg-red-500 rounded-full"></span>
                </button>
                <div class="flex items-center gap-2 border-l pl-4 border-gray-200">
                    <div class="text-right">
                        <p class="text-sm font-semibold text-gray-800">Admin Role</p>
                        <p class="text-[10px] text-gray-500 uppercase tracking-wide">Oficina de Finanzas</p>
                    </div>
                    <img src="https://i.pravatar.cc/150?u=a042581f4e29026704d" alt="Profile" class="w-9 h-9 rounded-full border border-gray-200">
                </div>
            </div>

        <!-- Page Content -->
        <main class="flex-1 overflow-y-auto p-6">
            <div class="flex justify-between items-center mb-6">

                    <h1 class="text-2xl font-bold text-gray-900">Control de Pagos y Recaudación</h1>
                </div>
                <div class="flex gap-3">
                    <button class="px-4 py-2 bg-white border border-gray-300 text-gray-700 rounded-lg hover:bg-gray-50 flex items-center gap-2 font-medium text-sm transition-colors shadow-sm">
                        <i class="ph ph-download-simple text-lg"></i> Exportar
                    </button>
                    <button class="px-4 py-2 bg-essalud-blue text-white rounded-lg hover:bg-essalud-accent flex items-center gap-2 font-medium text-sm transition-colors shadow-sm">
                        <i class="ph ph-plus text-lg"></i> Nuevo Registro
                    </button>
                </div>
            </div>

            <div class="bg-white rounded-xl shadow-sm border border-essalud-border p-6 text-center text-gray-500 py-20">
                <i class="ph ph-money text-4xl mb-3 text-gray-300"></i>
                <p>Módulo en construcción (RF07, RF09)</p>
            </div>
        </main>
    </div>
    <script src="../../assets/js/layout.js"></script>

</html>
